<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>So Energy — Spin the Windmill</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&family=Michroma&display=swap');

  :root{
    --ink:#14140A; --paper:#FAFAF7; --volt:#CBFB00; --volt-deep:#A6CE00;
    --miss:#FF4B3E; --blue:#3EC6FF; --gridP:0;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; background:var(--paper); overflow:hidden;
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); display:flex; align-items:center; justify-content:center; }

  .stage{ width:100%; max-width:640px; height:100dvh; display:flex; flex-direction:column;
    padding:clamp(18px,4.5vh,40px) clamp(18px,5vw,32px); position:relative; }

  .bgGlow{ position:absolute; left:50%; top:44%; width:min(520px,120vw); height:min(520px,120vw);
    transform:translate(-50%,-50%); z-index:0; pointer-events:none;
    background:radial-gradient(circle, rgba(232,255,61, calc(0.08 + var(--gridP) * 0.4)) 0%, rgba(232,255,61,0) 65%);
    transition:background 400ms ease; }

  .gridMeterRow{ display:flex; align-items:center; gap:10px; flex-shrink:0; position:relative; z-index:16; }
  .gridMeterLabel{ font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase;
    color:rgba(11,11,12,0.5); white-space:nowrap; }
  .gridMeterTrackWrap{ flex:1; position:relative; }
  .gridMeterTrack{ height:7px; border-radius:999px; background:rgba(11,11,12,0.1); overflow:hidden; }
  .gridMeterFill{ height:100%; width:0%; background:linear-gradient(90deg,var(--volt-deep),var(--volt)); transition:width 700ms cubic-bezier(.2,.7,.3,1); }
  .gridMeterFill.pulse{ animation:gridPulse 500ms ease; }
  @keyframes gridPulse{ 50%{ filter:brightness(1.6); } }

  .evBarWrap{ position:absolute; top:50%; left:0%; width:22px; height:13px; z-index:3; pointer-events:none;
    transform:translate(-50%,-50%); transform-origin:center;
    transition:left 700ms cubic-bezier(.2,.7,.3,1), filter 200ms ease; }
  .evBarWrap svg{ width:100%; height:100%; display:block; }
  .evBarWrap .evBody{ fill:var(--ink); }
  .evBarWrap .evBolt{ fill:var(--volt); }
  .evBarWrap.charging{ filter:drop-shadow(0 0 6px rgba(232,255,61,0.9)); }
  .evBarWrap.charging .evBody{ fill:var(--volt-deep); }

  .skylineSvg{ position:absolute; left:0; right:0; bottom:0; width:100%; height:78px; z-index:0; pointer-events:none; }
  .mountains path{ fill:var(--ink); opacity:0.3; }
  .buildingRect{ fill:var(--ink); opacity:0.92; }
  .win{ fill:rgba(250,247,245,0.18); transition:fill 400ms ease, filter 400ms ease; }
  .win.lit{ fill:var(--volt); filter:drop-shadow(0 0 2.5px rgba(232,255,61,0.9)); }
  .ferrisRotor{ transform-box:fill-box; transform-origin:50% 50%; }
  .ferrisRotor.spinning{ animation:ferrisSpin 1.8s linear infinite; }
  @keyframes ferrisSpin{ to{ transform:rotate(360deg); } }

  .brand{ display:flex; align-items:flex-start; justify-content:space-between; flex-shrink:0; position:relative; z-index:16; }
  .wordWrap{ display:flex; align-items:center; gap:8px; }
  .logoImg{ height:clamp(28px,6vw,38px); width:auto; display:block; border-radius:4px; }
  .partner{ font-family:'Michroma',sans-serif; font-size:9px; font-weight:400; letter-spacing:0.02em;
    color:rgba(20,20,10,0.6); white-space:nowrap; }
  .brand .tag{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; text-align:right; color:rgba(11,11,12,0.55); max-width:120px; }

  .main{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; min-height:0; position:relative; }

  h1{ font-family:'Archivo Black',sans-serif; font-size:clamp(26px,6.5vw,38px); line-height:1.05; margin:0; text-align:center; max-width:14ch; }
  .sub{ font-size:13px; color:rgba(11,11,12,0.65); text-align:center; max-width:32ch; margin:-14px 0 0; }

  .wheelOuter{ position:relative; width:min(78vw,340px); aspect-ratio:1; flex-shrink:0; }
  .pointer{ position:absolute; top:-4px; left:50%; transform:translateX(-50%); z-index:6;
    width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent; border-top:24px solid var(--paper);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,0.35)); }

  .evOrbitWrap{ display:none; }
  .wheelDisc{ position:absolute; inset:0; border-radius:50%; box-shadow:0 0 0 6px var(--ink), 0 20px 40px rgba(0,0,0,0.2);
    transition:transform 7200ms cubic-bezier(0.1,0.6,0.08,1); }
  .segLabel{ position:absolute; left:50%; top:50%; transform-origin:0 0;
    display:flex; flex-direction:column; align-items:center; gap:3px; width:58px; }
  .segLabel .segEmoji{ font-size:17px; line-height:1; width:30px; height:30px; border-radius:50%;
    background:var(--paper); display:flex; align-items:center; justify-content:center; flex-shrink:0;
    box-shadow:0 2px 5px rgba(0,0,0,0.3), inset 0 0 0 2px rgba(20,20,10,0.15); }
  .segLabel .segName{ font-family:'Archivo Black',sans-serif; font-size:9px; letter-spacing:0.01em; line-height:1.15;
    text-align:center; white-space:normal; }
  .hub{ position:absolute; inset:33%; border-radius:50%; background:var(--paper); box-shadow:0 0 0 5px var(--ink);
    display:flex; align-items:center; justify-content:center; z-index:3; }
  .hub svg{ width:58%; height:58%; animation:hubIdle 7s linear infinite; }
  .hub svg.fast{ animation-duration:0.5s; }
  @keyframes hubIdle{ to{ transform:rotate(360deg); } }

  .btn-primary{ font-family:'Inter',sans-serif; font-weight:800; font-size:16px; letter-spacing:0.03em;
    background:var(--ink); color:var(--paper); border:none; padding:17px 44px; border-radius:999px; cursor:pointer;
    box-shadow:0 6px 0 #000; transition:transform 90ms ease, box-shadow 90ms ease; flex-shrink:0; }
  .btn-primary:active{ transform:translateY(4px); box-shadow:0 2px 0 #000; }
  .btn-primary:disabled{ opacity:0.5; cursor:default; }

  #entryScreen{ position:absolute; inset:0; z-index:15; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:16px; text-align:center; padding:32px; background:var(--paper);
    transition:opacity 320ms ease; }
  #entryScreen.hide{ opacity:0; pointer-events:none; }
  #entryScreen h1{ font-family:'Archivo Black',sans-serif; font-size:clamp(28px,7vw,40px); line-height:1.05; margin:0; max-width:12ch; }
  #entryScreen p{ font-size:13px; color:rgba(11,11,12,0.65); max-width:30ch; margin:0; }
  .nameInput{ font-family:'Inter',sans-serif; font-size:16px; font-weight:600; text-align:center;
    padding:14px 22px; border:2px solid var(--ink); border-radius:999px; background:var(--paper); color:var(--ink);
    width:min(70vw,280px); outline:none; }
  .nameInput:focus{ box-shadow:0 0 0 3px rgba(232,255,61,0.7); }

  #reveal{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(20,20,10,0.55); opacity:0; pointer-events:none;
    transition:opacity 300ms ease; z-index:10; }
  #reveal.show{ opacity:1; pointer-events:auto; }
  .revealCard{ background:var(--volt); color:var(--ink); text-align:center; padding:34px 30px;
    border-radius:24px; width:86%; max-width:320px; box-shadow:0 30px 60px rgba(0,0,0,0.35);
    transform:scale(0.88); transition:transform 320ms cubic-bezier(.2,.8,.3,1.1); }
  #reveal.show .revealCard{ transform:scale(1); }
  #reveal.grand .revealCard{ background:var(--ink); color:var(--volt); }
  #reveal .eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:8px; opacity:0.75; }
  #reveal h2{ font-family:'Archivo Black',sans-serif; font-size:clamp(26px,7vw,38px); line-height:1.02; margin:0 0 18px; }
  #reveal .code{ font-family:'IBM Plex Mono',monospace; font-size:15px; border:2px dashed currentColor; border-radius:10px; padding:10px 20px; letter-spacing:0.08em; margin-bottom:18px; display:inline-block; }
  #reveal p.note{ font-size:13px; max-width:30ch; opacity:0.8; margin:0 auto 22px; }
  #reveal button{ font-family:'Inter',sans-serif; font-weight:800; font-size:13px; background:var(--ink); color:var(--paper); border:none; padding:12px 26px; border-radius:999px; cursor:pointer; }
  #reveal.grand button{ background:var(--volt); color:var(--ink); }

  .confetti-layer{ position:fixed; inset:0; pointer-events:none; z-index:20; overflow:hidden; }
  .confetto{ position:absolute; top:50%; left:50%; width:9px; height:14px; border-radius:2px; animation:confettiFly 950ms cubic-bezier(.15,.8,.4,1) forwards; }
  @keyframes confettiFly{ 0%{ transform:translate(-50%,-50%) rotate(0deg); opacity:1;} 100%{ transform:translate(var(--dx),var(--dy)) rotate(var(--rot)); opacity:0;} }

  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; } .wheelDisc{ transition:none !important; } }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div id="entryScreen">
    <h1>WELCOME</h1>
    <p>Enter your name to spin the windmill.</p>
    <input type="text" id="nameInput" class="nameInput" placeholder="Your name" autocomplete="off" maxlength="30" />
    <button class="btn-primary" id="continueBtn">Continue</button>
  </div>

  <div class="bgGlow" id="bgGlow"></div>
  <svg class="skylineSvg" viewBox="0 0 460 120" preserveAspectRatio="none">

      <circle cx="415" cy="78" r="26" fill="none" stroke="var(--ink)" stroke-width="2.5"/>
      <line x1="389" y1="78" x2="441" y2="78" stroke="var(--ink)" stroke-width="1.4"/>
      <line x1="415" y1="52" x2="415" y2="104" stroke="var(--ink)" stroke-width="1.4"/>
      <line x1="396.6" y1="59.6" x2="433.4" y2="96.4" stroke="var(--ink)" stroke-width="1.4"/>
      <line x1="396.6" y1="96.4" x2="433.4" y2="59.6" stroke="var(--ink)" stroke-width="1.4"/>
      <circle class="win ferrisLight" cx="415" cy="52" r="2.2"/>
      <circle class="win ferrisLight" cx="433.4" cy="59.6" r="2.2"/>
      <circle class="win ferrisLight" cx="441" cy="78" r="2.2"/>
      <circle class="win ferrisLight" cx="433.4" cy="96.4" r="2.2"/>
      <circle class="win ferrisLight" cx="415" cy="104" r="2.2"/>
      <circle class="win ferrisLight" cx="396.6" cy="96.4" r="2.2"/>
      <circle class="win ferrisLight" cx="389" cy="78" r="2.2"/>
      <circle class="win ferrisLight" cx="396.6" cy="59.6" r="2.2"/>
    </g>
  </svg>

    </div>
    <div class="tag">We do energy,<br/>you do you</div>
  </div>

  <div class="gridMeterRow">
    <div class="gridMeterLabel">Grid charge</div>
    <div class="gridMeterTrackWrap">
      <div class="gridMeterTrack"><div class="gridMeterFill" id="gridMeterFill"></div></div>
      <div class="evBarWrap" id="evBarWrap" style="display:none;">
        <svg id="evCar" viewBox="0 0 30 18">
          <rect class="evBody" x="2" y="6" width="26" height="8" rx="3.5"/>
          <rect class="evBody" x="9" y="1" width="12" height="6" rx="2.5"/>
          <circle class="evBody" cx="9" cy="15" r="3"/>
          <circle class="evBody" cx="21" cy="15" r="3"/>
          <path class="evBolt" d="M16 2 L11 9 L14.5 9 L13 15 L20 7 L16.5 7 Z"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="main">
    <h1>SPIN THE WINDMILL</h1>
    <p class="sub" id="subText">Give it a spin — every slice wins something.</p>

    <div class="wheelOuter">
      <div class="pointer"></div>
      <div class="wheelDisc" id="wheelDisc">
        <div id="labelLayer"></div>
        <div class="hub">
          <svg id="hubSvg" viewBox="0 0 24 24" fill="var(--ink)">
            <circle cx="12" cy="12" r="1.7"/>
            <path d="M12 12 L12 2 C16.5 2 16.5 8.5 12 8.5 Z"/>
            <path d="M12 12 L20.9 17.2 C18.8 20.9 13 18.8 13.7 14.7 Z"/>
            <path d="M12 12 L3.1 17.2 C0.9 13.5 6.4 10.3 10.3 12.4 Z" opacity="0"/>
            <path d="M12 12 L3.1 6.8 C5.2 3.1 11 5.2 10.3 9.3 Z"/>
          </svg>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="spinBtn">SPIN</button>
  </div>

  <div id="reveal">
    <div class="revealCard">
      <div class="eyebrow" id="revealEyebrow">You landed on</div>
      <h2 id="prizeName">Nice hustle</h2>
      <p class="note" id="revealNote">Show this screen to our team to claim your reward.</p>
      <button id="resetBtn">Next player</button>
    </div>
  </div>
</div>

<script>
  // EDIT PRIZES HERE — weight controls slice size, which controls the odds
  const PRIZES = [
    { name:"Coffee",          short:"COFFEE",        emoji:"☕", weight:1 },
    { name:"So Energy Cup",   short:"SO ENERGY CUP", emoji:"🥤", weight:1 },
    { name:"Lanyard",         short:"LANYARD",       emoji:"📛", weight:1 },
    { name:"Ganache Tart",    short:"GANACHE TART",  emoji:"🍰", weight:1 },
    { name:"Croissant",       short:"CROISSANT",     emoji:"🥐", weight:1 },
    { name:"Muffin",          short:"MUFFIN",        emoji:"🧁", weight:1 },
  ];
  const HEADLINES = ["NICE HUSTLE","POWERED UP","CURRENT UNLOCKED","THAT'S THE SPARK"];
  const GRAND_HEADLINES = ["JACKPOT ENERGY","MAXIMUM VOLTAGE","OFF THE CHARTS"];

  const wheelDisc = document.getElementById('wheelDisc');
  const labelLayer = document.getElementById('labelLayer');
  const spinBtn = document.getElementById('spinBtn');
  const hubSvg = document.getElementById('hubSvg');
  const reveal = document.getElementById('reveal');
  const revealEyebrow = document.getElementById('revealEyebrow');
  const prizeNameEl = document.getElementById('prizeName');
  const resetBtn = document.getElementById('resetBtn');
  const entryScreen = document.getElementById('entryScreen');
  const nameInput = document.getElementById('nameInput');
  const continueBtn = document.getElementById('continueBtn');
  const subText = document.getElementById('subText');
  const revealNote = document.getElementById('revealNote');
  const gridMeterFill = document.getElementById('gridMeterFill');
  const buildingsGroup = document.getElementById('buildingsGroup');

  const SVG_NS = 'http://www.w3.org/2000/svg';
  function svgEl(tag, attrs){
    const el = document.createElementNS(SVG_NS, tag);
    Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
    return el;
  }

  const buildings = [];
  function fillCluster(startX, endX, count){
    const gap = 4;
    const bw = (endX - startX - gap*(count-1)) / count;
    for (let i=0; i<count; i++){
      const x = startX + i*(bw+gap);
      const h = 24 + Math.random()*44;
      const y = 120 - h;
      buildingsGroup.appendChild(svgEl('rect', { class:'buildingRect', x, y, width:bw, height:h, rx:1 }));
      const winCols = bw > 14 ? 2 : 1;
      for (let c=0; c<winCols; c++){
        const wx = x + bw*(c+0.5)/winCols - 2;
        const wy = y + 6 + Math.random()*(h*0.5);
        buildingsGroup.appendChild(svgEl('rect', { class:'win', x:wx, y:wy, width:4, height:4, rx:0.5 }));
      }
    }
  }
  fillCluster(44, 146, 5);
  fillCluster(266, 344, 4);

  document.querySelectorAll('.win').forEach(el => buildings.push(el));
  const ferrisRotor = document.getElementById('ferrisRotor');
  const evBarWrap = document.getElementById('evBarWrap');

  let gridCharge = 0;
  function setGridCharge(pct, justWrapped){
    gridCharge = pct;
    document.documentElement.style.setProperty('--gridP', (pct/100).toFixed(3));
    gridMeterFill.style.width = pct + '%';
    if (justWrapped){
      gridMeterFill.classList.remove('pulse'); void gridMeterFill.offsetWidth; gridMeterFill.classList.add('pulse');
    }
    const litCount = Math.round((pct/100) * buildings.length);
    buildings.forEach((win,i) => win.classList.toggle('lit', i < litCount));
  }

  function rand(a){ return a[Math.floor(Math.random()*a.length)]; }

  const totalWeight = PRIZES.reduce((s,p)=>s+p.weight,0);
  let acc = 0;
  const segments = PRIZES.map(p => {
    const start = acc / totalWeight * 360;
    acc += p.weight;
    const end = acc / totalWeight * 360;
    return { ...p, start, end, mid:(start+end)/2 };
  });

  function buildWheelVisual(){
    const colorA = getComputedStyle(document.documentElement).getPropertyValue('--ink').trim();
    const colorB = getComputedStyle(document.documentElement).getPropertyValue('--volt').trim();
    const stops = segments.map((s,i) => {
      const col = i % 2 === 0 ? colorA : colorB;
      return col + ' ' + s.start + 'deg ' + s.end + 'deg';
    }).join(', ');
    wheelDisc.style.background = 'conic-gradient(' + stops + ')';

    labelLayer.innerHTML = '';
    segments.forEach((s,i) => {
      const label = document.createElement('div');
      label.className = 'segLabel';
      label.innerHTML = '<span class="segEmoji">' + s.emoji + '</span><span class="segName">' + s.name + '</span>';
      label.style.color = i % 2 === 0 ? colorB : colorA;
      const R = 36; // % of wheel radius from center
      const theta = s.mid * Math.PI / 180;
      const dx = R * Math.sin(theta);
      const dy = -R * Math.cos(theta);
      label.style.left = (50 + dx) + '%';
      label.style.top = (50 + dy) + '%';
      label.style.transform = 'translate(-50%,-50%)';
      labelLayer.appendChild(label);
    });
  }
  buildWheelVisual();

  function pickWeighted(){
    let r = Math.random() * totalWeight;
    for (const p of PRIZES){
      if (r < p.weight) return p;
      r -= p.weight;
    }
    return PRIZES[PRIZES.length-1];
  }

  let currentRotation = 0;
  let spinning = false;

  function confettiBurst(colors, count){
    const layer = document.createElement('div');
    layer.className = 'confetti-layer';
    document.body.appendChild(layer);
    for (let i=0;i<count;i++){
      const c = document.createElement('div');
      c.className = 'confetto';
      const angle = Math.random()*Math.PI*2;
      const dist = 120 + Math.random()*230;
      c.style.setProperty('--dx', (Math.cos(angle)*dist)+'px');
      c.style.setProperty('--dy', (Math.sin(angle)*dist-60)+'px');
      c.style.setProperty('--rot', (Math.random()*720-360)+'deg');
      c.style.background = rand(colors);
      c.style.animationDelay = (Math.random()*80)+'ms';
      layer.appendChild(c);
    }
    setTimeout(() => layer.remove(), 1150);
  }

  function getVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

  function spin(){
    if (spinning) return;
    spinning = true;
    spinBtn.disabled = true;
    hubSvg.classList.add('fast');

    // The spin powers up the city — all lights on
    buildings.forEach(win => win.classList.add('lit'));
    document.documentElement.style.setProperty('--gridP', 1);
    gridMeterFill.style.width = '100%';
    evBarWrap.style.left = '100%';
    ferrisRotor.classList.add('spinning');

    evBarWrap.classList.add('charging');
    setTimeout(() => evBarWrap.classList.remove('charging'), 380);

    const chosen = pickWeighted();
    const seg = segments.find(s => s.name === chosen.name);
    const theta = seg.start + Math.random() * (seg.end - seg.start) * 0.8 + (seg.end-seg.start)*0.1;
    const requiredMod = (360 - theta + 360) % 360;
    const fullSpins = 10 + Math.floor(Math.random()*2);
    const diff = ((requiredMod - (currentRotation % 360)) % 360 + 360) % 360;
    currentRotation = currentRotation + fullSpins*360 + diff;

    wheelDisc.style.transform = 'rotate(' + currentRotation + 'deg)';

    setTimeout(() => {
      hubSvg.classList.remove('fast');
      ferrisRotor.classList.remove('spinning');
      spinning = false;
      spinBtn.disabled = false;

      const isGrand = !!chosen.isGrand;
      prizeNameEl.textContent = chosen.name;
      revealEyebrow.textContent = isGrand ? rand(GRAND_HEADLINES) : rand(HEADLINES);
      reveal.classList.toggle('grand', isGrand);

      const colors = isGrand ? [getVar('--volt'), getVar('--ink'), '#fff6bf'] : [getVar('--volt'), getVar('--ink'), getVar('--blue')];
      confettiBurst(colors, isGrand ? 48 : 26);
      reveal.classList.add('show');

      const gain = isGrand ? 25 : 12;
      const next = gridCharge + gain;
      if (next >= 100){ setGridCharge(next % 100 === 0 ? 100 : next % 100, true); }
      else { setGridCharge(next, false); }

      // City powers back down after the result, ready for the next spin
      buildings.forEach(win => win.classList.remove('lit'));
      document.documentElement.style.setProperty('--gridP', 0);

      // EV drives back to the start of the bar, ready for the next spin
      evBarWrap.style.left = '0%';
    }, 7300);
  }

  function resetAll(){
    reveal.classList.remove('show');
    nameInput.value = '';
    entryScreen.classList.remove('hide');
    evBarWrap.style.display = 'none';
    nameInput.focus();
  }

  spinBtn.addEventListener('click', spin);
  resetBtn.addEventListener('click', resetAll);

  let playerName = '';
  function submitName(){
    const val = nameInput.value.trim();
    playerName = val || 'Friend';
    subText.textContent = 'Nice to meet you, ' + playerName + ' — give it a spin, every slice wins something.';
    revealNote.textContent = playerName + ', show this screen to our team to claim your reward.';
    entryScreen.classList.add('hide');
    evBarWrap.style.display = 'block';
  }
  continueBtn.addEventListener('click', submitName);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitName(); });
  nameInput.focus();

  // City starts dark — the spin powers it up
  document.documentElement.style.setProperty('--gridP', 0);
</script>
